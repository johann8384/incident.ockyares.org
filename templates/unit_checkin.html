<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Check-In - Emergency Management</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" 
          crossorigin="" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #ff6b6b, #ee5a52);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }

        .form-container {
            padding: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 0.95rem;
        }

        .required {
            color: #ff6b6b;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            background: white;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .location-section {
            background: #f8f9fc;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .location-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .location-header h3 {
            margin-left: 10px;
            color: #555;
        }

        .location-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .coordinates {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }

        .photo-section {
            background: #f8f9fc;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .photo-input {
            margin-bottom: 15px;
        }

        .photo-preview {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .assignment-card {
            background: linear-gradient(45deg, #28a745, #20c997);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .assignment-card h3 {
            margin-bottom: 10px;
        }

        .map-container {
            height: 250px;
            border-radius: 8px;
            margin: 10px 0;
            overflow: hidden;
            border: 2px solid #e1e8ed;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .emoji-marker {
            background: none !important;
            border: none !important;
            text-align: center;
            font-size: 20px;
            line-height: 30px;
        }

        @media (max-width: 480px) {
            .container {
                margin: 5px;
                border-radius: 10px;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .location-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Unit Check-In</h1>
            <p>Emergency Response Team Registration</p>
        </div>

        <div class="form-container">
            <form id="checkinForm">
                <div class="form-group">
                    <label for="incidentSelect">Incident <span class="required">*</span></label>
                    <select id="incidentSelect" name="incident_id" required>
                        <option value="">Loading incidents...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="unitId">Unit ID <span class="required">*</span></label>
                    <input type="text" id="unitId" name="unit_id" placeholder="e.g., UNIT-001, RESCUE-A" required>
                </div>

                <div class="form-group">
                    <label for="officerName">Officer in Charge <span class="required">*</span></label>
                    <input type="text" id="officerName" name="officer_name" placeholder="Officer Name" required>
                </div>

                <div class="form-group">
                    <label for="personnelCount">Personnel Count <span class="required">*</span></label>
                    <input type="number" id="personnelCount" name="personnel_count" min="1" max="50" placeholder="Number of team members" required>
                </div>

                <div class="form-group">
                    <label for="equipmentStatus">Equipment Status <span class="required">*</span></label>
                    <select id="equipmentStatus" name="equipment_status" required>
                        <option value="">Select Status</option>
                        <option value="fully_operational">Fully Operational</option>
                        <option value="partial">Partially Operational</option>
                        <option value="limited">Limited Capability</option>
                        <option value="maintenance_needed">Maintenance Needed</option>
                    </select>
                </div>

                <div class="location-section">
                    <div class="location-header">
                        <span style="font-size: 1.5rem;">📍</span>
                        <h3>Current Location</h3>
                    </div>
                    
                    <div class="location-buttons">
                        <button type="button" class="btn btn-primary" id="getLocationBtn">
                            📱 Use GPS
                        </button>
                        <button type="button" class="btn btn-secondary" id="mapLocationBtn">
                            🗺️ Pick on Map
                        </button>
                    </div>

                    <div class="map-container" id="mapContainer" style="display: none;">
                        <div id="map"></div>
                    </div>

                    <div class="coordinates" id="coordinates" style="display: none;">
                        <strong>Coordinates:</strong> <span id="coordsDisplay"></span>
                    </div>
                    
                    <input type="hidden" id="latitude" name="latitude">
                    <input type="hidden" id="longitude" name="longitude">
                </div>

                <div class="photo-section">
                    <div class="location-header">
                        <span style="font-size: 1.5rem;">📸</span>
                        <h3>Team Photo</h3>
                    </div>
                    
                    <div class="photo-input">
                        <input type="file" id="teamPhoto" name="photo" accept="image/*" capture="environment">
                    </div>
                    
                    <img id="photoPreview" class="photo-preview" style="display: none;">
                </div>

                <button type="submit" class="btn submit-btn">
                    ✅ Check In Unit
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Submitting check-in...</p>
            </div>

            <div id="result"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" 
            crossorigin=""></script>

    <script>
        // Global variables
        let map = null;
        let marker = null;
        let incidentMarker = null;
        let incidentLocation = null;
        let incidents = [];

        // Load incidents on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadIncidents();
            setupEventListeners();
        });

        async function loadIncidents() {
            try {
                const response = await fetch('/api/incidents');
                const data = await response.json();
                
                const select = document.getElementById('incidentSelect');
                select.innerHTML = '<option value="">Select an incident...</option>';
                
                if (data.success) {
                    incidents = data.incidents;
                    data.incidents.forEach(incident => {
                        const option = document.createElement('option');
                        option.value = incident.incident_id;
                        option.textContent = `${incident.incident_name} (${incident.incident_type})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error loading incidents:', error);
                document.getElementById('incidentSelect').innerHTML = '<option value="">Error loading incidents</option>';
            }
        }

        function setupEventListeners() {
            // Incident selection
            document.getElementById('incidentSelect').addEventListener('change', function() {
                const incidentId = this.value;
                if (incidentId) {
                    // Find the selected incident and set location
                    const selectedIncident = incidents.find(inc => inc.incident_id === incidentId);
                    if (selectedIncident && selectedIncident.latitude && selectedIncident.longitude) {
                        incidentLocation = {
                            lat: selectedIncident.latitude,
                            lng: selectedIncident.longitude,
                            name: selectedIncident.incident_name
                        };
                        
                        // If map is already showing, update it
                        if (map && document.getElementById('mapContainer').style.display !== 'none') {
                            updateMapWithIncident();
                        }
                    }
                }
            });

            // GPS location button
            document.getElementById('getLocationBtn').addEventListener('click', getCurrentLocation);
            
            // Map location button
            document.getElementById('mapLocationBtn').addEventListener('click', showMapPicker);
            
            // Photo preview
            document.getElementById('teamPhoto').addEventListener('change', previewPhoto);
            
            // Form submission
            document.getElementById('checkinForm').addEventListener('submit', submitCheckin);
        }

        function initMap() {
            if (map) {
                map.remove(); // Clean up existing map
            }

            // Use incident location if available, otherwise default
            let center = [37.7749, -122.4194]; // Default to San Francisco
            
            if (incidentLocation) {
                center = [incidentLocation.lat, incidentLocation.lng];
            }

            map = L.map('map').setView(center, 15);

            // Add OpenStreetMap tiles
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Add incident marker
            addIncidentMarker();

            // Add click handler for map
            map.on('click', function(e) {
                setLocationFromMap(e.latlng.lat, e.latlng.lng);
            });
        }

        function addIncidentMarker() {
            // Remove existing incident marker
            if (incidentMarker) {
                map.removeLayer(incidentMarker);
            }

            // Add incident marker if location is available
            if (incidentLocation && map) {
                incidentMarker = L.marker([incidentLocation.lat, incidentLocation.lng], {
                    icon: L.divIcon({
                        html: '🚨',
                        iconSize: [30, 30],
                        className: 'emoji-marker'
                    })
                }).addTo(map);
                
                incidentMarker.bindPopup(`<b>Incident Location</b><br>${incidentLocation.name || 'Emergency Incident'}`);
            }
        }

        function updateMapWithIncident() {
            if (map && incidentLocation) {
                // Pan to incident location
                map.setView([incidentLocation.lat, incidentLocation.lng], 15);
                
                // Add/update incident marker
                addIncidentMarker();
            }
        }

        function getCurrentLocation() {
            const btn = document.getElementById('getLocationBtn');
            btn.disabled = true;
            btn.textContent = '📡 Getting Location...';
            
            if (!navigator.geolocation) {
                showAlert('GPS not supported on this device', 'error');
                btn.disabled = false;
                btn.textContent = '📱 Use GPS';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    setLocation(position.coords.latitude, position.coords.longitude);
                    btn.disabled = false;
                    btn.textContent = '📱 Use GPS';
                },
                function(error) {
                    console.error('GPS error:', error);
                    showAlert('Could not get GPS location. Please try map selection.', 'error');
                    btn.disabled = false;
                    btn.textContent = '📱 Use GPS';
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 300000
                }
            );
        }

        function showMapPicker() {
            const mapContainer = document.getElementById('mapContainer');
            mapContainer.style.display = 'block';
            
            // Initialize map after container is visible
            setTimeout(() => {
                initMap();
            }, 100);
        }

        function setLocationFromMap(lat, lng) {
            setLocation(lat, lng);
            
            // Update or add unit marker on map
            if (marker) {
                marker.setLatLng([lat, lng]);
            } else {
                marker = L.marker([lat, lng], {
                    icon: L.divIcon({
                        html: '📍',
                        iconSize: [30, 30],
                        className: 'emoji-marker'
                    })
                }).addTo(map);
            }
            
            marker.bindPopup('<b>Unit Location</b><br>Selected check-in location').openPopup();
        }

        function setLocation(lat, lng) {
            document.getElementById('latitude').value = lat;
            document.getElementById('longitude').value = lng;
            document.getElementById('coordinates').style.display = 'block';
            document.getElementById('coordsDisplay').textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        }

        function previewPhoto() {
            const file = document.getElementById('teamPhoto').files[0];
            const preview = document.getElementById('photoPreview');
            
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        async function submitCheckin(event) {
            event.preventDefault();
            
            const form = document.getElementById('checkinForm');
            const formData = new FormData(form);
            
            // Convert to JSON for most fields
            const data = {
                incident_id: formData.get('incident_id'),
                unit_id: formData.get('unit_id'),
                officer_name: formData.get('officer_name'),
                personnel_count: formData.get('personnel_count'),
                equipment_status: formData.get('equipment_status'),
                latitude: formData.get('latitude'),
                longitude: formData.get('longitude')
            };
            
            // Show loading
            document.getElementById('loading').style.display = 'block';
            form.style.display = 'none';
            
            try {
                const response = await fetch('/api/unit-checkin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showResult(result);
                } else {
                    showAlert(result.error || 'Check-in failed', 'error');
                }
            } catch (error) {
                console.error('Error submitting check-in:', error);
                showAlert('Network error. Please try again.', 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
                form.style.display = 'block';
            }
        }

        function showResult(result) {
            const resultDiv = document.getElementById('result');
            
            let html = `
                <div class="alert alert-success">
                    <h3>✅ Check-in Successful!</h3>
                    <p>Unit has been registered and checked in.</p>
                </div>
            `;
            
            if (result.assignment) {
                html += `
                    <div class="assignment-card">
                        <h3>📋 Assignment Received</h3>
                        <p><strong>Division:</strong> ${result.assignment.division_name}</p>
                        <p><strong>Type:</strong> ${result.assignment.search_type}</p>
                        <p><strong>Priority:</strong> ${result.assignment.priority}</p>
                        <p><strong>Duration:</strong> ${result.assignment.estimated_duration}</p>
                    </div>
                `;
            } else {
                html += `
                    <div class="alert alert-info">
                        <p>📋 No immediate assignment available. Standby for instructions.</p>
                    </div>
                `;
            }
            
            resultDiv.innerHTML = html;
            
            // Reset form for new check-in
            setTimeout(() => {
                if (confirm('Check in another unit?')) {
                    location.reload();
                }
            }, 5000);
        }

        function showAlert(message, type) {
            const resultDiv = document.getElementById('result');
            const alertClass = type === 'error' ? 'alert-error' : 'alert-success';
            
            resultDiv.innerHTML = `
                <div class="alert ${alertClass}">
                    <p>${message}</p>
                </div>
            `;
            
            setTimeout(() => {
                resultDiv.innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
